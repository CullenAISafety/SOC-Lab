input {

  # Linux logs
  file {
    path => "/logs/linux/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    type => "linux"
  }

  # Windows logs (if exported as text)
  file {
    path => "/logs/windows/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    type => "windows"
  }

  # Nmap scan results
  file {
    path => "/logs/network/*.txt"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    type => "network"
  }

  # Optional: TCP input (for live ingestion)
  tcp {
    port => 5000
    codec => json
  }
}

filter {

  # -------------------------
  # LINUX AUTH LOG PARSING
  # -------------------------
  if [type] == "linux" {
    grok {
      match => {
        "message" => [
          "%{SYSLOGTIMESTAMP:timestamp} %{DATA:program}\[%{NUMBER:pid}\]: %{GREEDYDATA:log_message}",
          "%{SYSLOGTIMESTAMP:timestamp} %{GREEDYDATA:log_message}"
        ]
      }
    }
  }

  # -------------------------
  # DETECT SSH BRUTE FORCE
  # -------------------------
  if "Failed password" in [message] {
    mutate { add_field => { "alert" => "SSH Brute Force Attempt" } }
  }

  # -------------------------
  # DETECT SUSPICIOUS COMMANDS
  # -------------------------
  if "curl http" in [message] or "wget http" in [message] {
    mutate { add_field => { "alert" => "Possible Command & Control Activity" } }
  }

  # -------------------------
  # DETECT FILE TAMPERING
  # -------------------------
  if "encrypted" in [message] {
    mutate { add_field => { "alert" => "Possible Ransomware Activity" } }
  }

  # -------------------------
  # DETECT NMAP SCANS
  # -------------------------
  if [type] == "network" {
    if "Nmap scan report" in [message] {
      mutate { add_field => { "alert" => "Network Scan Detected" } }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "soc-lab-%{+YYYY.MM.dd}"
  }

  stdout { codec => rubydebug }
}
